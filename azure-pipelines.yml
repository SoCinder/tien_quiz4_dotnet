trigger:
- main

pool:
  name: Default

variables:
  buildConfiguration: 'Release'

steps:

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '9.x'

# Restore dependencies
- script: dotnet restore
  displayName: Restore

# Build project
- script: dotnet build --configuration $(buildConfiguration)
  displayName: Build


- script: dotnet publish -c $(buildConfiguration) -r win-x64 --self-contained true -o $(Build.ArtifactStagingDirectory)
  displayName: Publish AOT

# Publish artifact
- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: 'drop'